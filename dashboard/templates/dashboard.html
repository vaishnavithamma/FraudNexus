<!DOCTYPE html>
<html>

<head>

<title>FraudNexus AI</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="header">

<h2>FraudNexus AI</h2>
<p>Real-Time Fraud Monitoring Command Center</p>

</div>


<div class="metrics">

<div class="card">
<h1 id="approvedCount">12911</h1>
<span>Approved</span>
</div>

<div class="card red">
<h1 id="blockedCount">406</h1>
<span>Blocked</span>
</div>

<div class="card yellow">
<h1 id="challengeCount">160</h1>
<span>Challenges</span>
</div>

<div class="card green">
<h1 id="latencyValue">0ms</h1>
<span>Latency</span>
</div>

</div>

<div class="grid">

<div class="panel">

<h3>🚨 Interceptor Feed</h3>

<ul id="feed"></ul>

</div>


<div class="panel">

<h3>Fraud Signals</h3>

<canvas id="graph"></canvas>

</div>


<div class="panel">

<h3>Latency Monitor</h3>

<canvas id="latency"></canvas>

</div>

</div>


<div class="decision">

<h3>Transaction Decision</h3>

<div id="decisionBox">

<p>Waiting for transaction analysis...</p>

</div>

</div>


<script src="{{ url_for('static', filename='dashboard.js') }}"></script>

</body>
</html>
